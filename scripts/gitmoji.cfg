# Conventional commit → gitmoji mapping
# Reference: https://gitmoji.dev / https://www.conventionalcommits.org
#
# Format: bash associative array, sourced by scripts/gitmoji.sh

declare -A gitmoji=(
    [feat]="✨"       # Introduce new features
    [fix]="🐛"       # Fix a bug
    [docs]="📝"      # Add or update documentation
    [style]="🎨"     # Improve structure / format of the code
    [refactor]="♻️"   # Refactor code
    [perf]="⚡️"      # Improve performance
    [test]="✅"      # Add, update, or pass tests
    [build]="📦️"     # Add or update compiled files or packages
    [ci]="👷"        # Add or update CI build system
    [chore]="🔧"     # Add or update configuration files
    [revert]="⏪️"    # Revert changes
    [hotfix]="🚑️"    # Critical hotfix
    [release]="🔖"   # Release / version tags
)
